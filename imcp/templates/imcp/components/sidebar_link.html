{% load static %}
{% url url_name as nav_url %}
<a href="{{ nav_url }}"
   class="sidebar-icon w-12 h-12 flex flex-col items-center justify-center gap-0.5 text-white/80 hover:text-white {% if request.path == nav_url %}active{% endif %}"
   title="{{ label }}">
  <span class="text-lg leading-none">{{ icon }}</span>
  <span class="text-[9px] font-medium">{{ label }}</span>
</a>
