<svg width="960" height="100" viewBox="0 0 960 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="960" height="100" rx="12" fill="#1a1d27" stroke="#2e3347" stroke-width="1"/>

  <!-- dividers -->
  <line x1="240" y1="20" x2="240" y2="80" stroke="#2e3347" stroke-width="1"/>
  <line x1="480" y1="20" x2="480" y2="80" stroke="#2e3347" stroke-width="1"/>
  <line x1="720" y1="20" x2="720" y2="80" stroke="#2e3347" stroke-width="1"/>

  <!-- Stat 1 -->
  <text x="120" y="52" text-anchor="middle" font-size="32" font-weight="800" fill="url(#sv)" font-family="'Segoe UI',sans-serif">&lt; 1 hr</text>
  <text x="120" y="74" text-anchor="middle" font-size="11" fill="#64748b" font-family="'Segoe UI',sans-serif">Live per service</text>

  <!-- Stat 2 -->
  <text x="360" y="52" text-anchor="middle" font-size="32" font-weight="800" fill="url(#sv)" font-family="'Segoe UI',sans-serif">0</text>
  <text x="360" y="74" text-anchor="middle" font-size="11" fill="#64748b" font-family="'Segoe UI',sans-serif">Lines changed in backend</text>

  <!-- Stat 3 -->
  <text x="600" y="52" text-anchor="middle" font-size="32" font-weight="800" fill="url(#sv)" font-family="'Segoe UI',sans-serif">4</text>
  <text x="600" y="74" text-anchor="middle" font-size="11" fill="#64748b" font-family="'Segoe UI',sans-serif">Auth types supported</text>

  <!-- Stat 4 -->
  <text x="840" y="52" text-anchor="middle" font-size="32" font-weight="800" fill="url(#sv)" font-family="'Segoe UI',sans-serif">3</text>
  <text x="840" y="74" text-anchor="middle" font-size="11" fill="#64748b" font-family="'Segoe UI',sans-serif">Spec formats (WSDL · OAS · JSON)</text>
