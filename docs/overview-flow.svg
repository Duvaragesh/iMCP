<svg width="960" height="220" viewBox="0 0 960 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
    <linearGradient id="gAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="220" rx="16" fill="#0f1117"/>

  <!-- AI Client box -->
  <rect x="20" y="70" width="160" height="80" rx="12" fill="#1a1d27" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="20" y="70" width="160" height="28" rx="10" fill="url(#gAccent)"/>
  <rect x="20" y="86" width="160" height="12" fill="url(#gAccent)"/>
  <text x="100" y="89" text-anchor="middle" font-size="11" font-weight="700" fill="white" font-family="'Segoe UI',sans-serif">AI Assistant</text>
  <text x="100" y="117" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="'Segoe UI',sans-serif">Claude / Copilot /</text>
  <text x="100" y="131" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="'Segoe UI',sans-serif">Any MCP Client</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="110" x2="248" y2="110" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,2"/>
  <text x="214" y="103" text-anchor="middle" font-size="9" fill="#818cf8" font-family="'Segoe UI',sans-serif">tools/list</text>
  <text x="214" y="122" text-anchor="middle" font-size="9" fill="#818cf8" font-family="'Segoe UI',sans-serif">tools/call</text>
  <text x="214" y="145" text-anchor="middle" font-size="8.5" fill="#475569" font-family="'Segoe UI',sans-serif">MCP JSON-RPC 2.0</text>

  <!-- iMCP box -->
  <rect x="250" y="40" width="460" height="140" rx="14" fill="#1a1d27" stroke="#818cf8" stroke-width="2"/>
  <rect x="250" y="40" width="460" height="32" rx="12" fill="url(#gAccent)"/>
  <rect x="250" y="58" width="460" height="14" fill="url(#gAccent)"/>
  <text x="480" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="white" font-family="'Segoe UI',sans-serif">iMCP Server</text>

  <!-- Internal boxes -->
  <rect x="268" y="88" width="100" height="40" rx="8" fill="#22263a" stroke="#2e3347" stroke-width="1"/>
  <text x="318" y="106" text-anchor="middle" font-size="9.5" fill="#818cf8" font-weight="600" font-family="'Segoe UI',sans-serif">Spec Parser</text>
  <text x="318" y="120" text-anchor="middle" font-size="8.5" fill="#475569" font-family="'Segoe UI',sans-serif">WSDL · OAS · JSON</text>

  <rect x="385" y="88" width="100" height="40" rx="8" fill="#22263a" stroke="#2e3347" stroke-width="1"/>
  <text x="435" y="106" text-anchor="middle" font-size="9.5" fill="#818cf8" font-weight="600" font-family="'Segoe UI',sans-serif">Tool Generator</text>
  <text x="435" y="120" text-anchor="middle" font-size="8.5" fill="#475569" font-family="'Segoe UI',sans-serif">JSON Schema tools</text>

  <rect x="502" y="88" width="90" height="40" rx="8" fill="#22263a" stroke="#2e3347" stroke-width="1"/>
  <text x="547" y="106" text-anchor="middle" font-size="9.5" fill="#06b6d4" font-weight="600" font-family="'Segoe UI',sans-serif">Auth Proxy</text>
  <text x="547" y="120" text-anchor="middle" font-size="8.5" fill="#475569" font-family="'Segoe UI',sans-serif">Bearer·Basic·OAuth2</text>

  <rect x="609" y="88" width="88" height="40" rx="8" fill="#22263a" stroke="#2e3347" stroke-width="1"/>
  <text x="653" y="106" text-anchor="middle" font-size="9.5" fill="#22c55e" font-weight="600" font-family="'Segoe UI',sans-serif">Executor</text>
  <text x="653" y="120" text-anchor="middle" font-size="8.5" fill="#475569" font-family="'Segoe UI',sans-serif">HTTP · SOAP · REST</text>

  <!-- Internal arrows -->
  <line x1="368" y1="108" x2="383" y2="108" stroke="#2e3347" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="485" y1="108" x2="500" y2="108" stroke="#2e3347" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="592" y1="108" x2="607" y2="108" stroke="#2e3347" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Labels row -->
  <text x="350" y="164" text-anchor="middle" font-size="9" fill="#475569" font-family="'Segoe UI',sans-serif">TTL Cache</text>
  <text x="480" y="164" text-anchor="middle" font-size="9" fill="#475569" font-family="'Segoe UI',sans-serif">Audit Log</text>
  <text x="600" y="164" text-anchor="middle" font-size="9" fill="#475569" font-family="'Segoe UI',sans-serif">Admin Portal</text>

  <!-- Arrow 2 -->
  <line x1="712" y1="110" x2="778" y2="110" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr2)" stroke-dasharray="4,2"/>
  <text x="745" y="103" text-anchor="middle" font-size="9" fill="#06b6d4" font-family="'Segoe UI',sans-serif">SOAP / REST</text>
  <text x="745" y="122" text-anchor="middle" font-size="9" fill="#06b6d4" font-family="'Segoe UI',sans-serif">HTTP calls</text>

  <!-- Backend box -->
  <rect x="780" y="70" width="160" height="80" rx="12" fill="#1a1d27" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="780" y="70" width="160" height="28" rx="10" fill="url(#gCyan)"/>
  <rect x="780" y="86" width="160" height="12" fill="url(#gCyan)"/>
  <text x="860" y="89" text-anchor="middle" font-size="11" font-weight="700" fill="white" font-family="'Segoe UI',sans-serif">Backend Services</text>
  <text x="860" y="117" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="'Segoe UI',sans-serif">WSDL · OpenAPI</text>
  <text x="860" y="131" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="'Segoe UI',sans-serif">SAP · IBMi · Apigee</text>
</svg>
