<svg width="960" height="280" viewBox="0 0 960 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f1117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="280" rx="16" fill="url(#bg)"/>
  <rect width="960" height="280" rx="16" fill="url(#glow)"/>
  <!-- subtle grid lines -->
  <line x1="0" y1="56"  x2="960" y2="56"  stroke="#2e3347" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="112" x2="960" y2="112" stroke="#2e3347" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="168" x2="960" y2="168" stroke="#2e3347" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="224" x2="960" y2="224" stroke="#2e3347" stroke-width="0.5" opacity="0.4"/>
  <line x1="192" y1="0" x2="192" y2="280" stroke="#2e3347" stroke-width="0.5" opacity="0.4"/>
  <line x1="384" y1="0" x2="384" y2="280" stroke="#2e3347" stroke-width="0.5" opacity="0.4"/>
  <line x1="576" y1="0" x2="576" y2="280" stroke="#2e3347" stroke-width="0.5" opacity="0.4"/>
  <line x1="768" y1="0" x2="768" y2="280" stroke="#2e3347" stroke-width="0.5" opacity="0.4"/>

  <!-- MCP badge -->
  <rect x="390" y="28" width="180" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="480" y="45" text-anchor="middle" font-size="11" font-weight="700" fill="#818cf8" font-family="'Segoe UI',sans-serif" letter-spacing="1">MODEL CONTEXT PROTOCOL</text>

  <!-- Main title -->
  <text x="480" y="118" text-anchor="middle" font-size="62" font-weight="800" fill="url(#title)" font-family="'Segoe UI',sans-serif" letter-spacing="-2">iMCP</text>

  <!-- Subtitle -->
  <text x="480" y="150" text-anchor="middle" font-size="18" font-weight="400" fill="#e2e8f0" font-family="'Segoe UI',sans-serif">Intelligent Legacy Bridge</text>

  <!-- Tagline -->
  <text x="480" y="180" text-anchor="middle" font-size="13" fill="#94a3b8" font-family="'Segoe UI',sans-serif">Turn any existing backend service into an AI-accessible tool</text>
  <text x="480" y="198" text-anchor="middle" font-size="13" fill="#94a3b8" font-family="'Segoe UI',sans-serif">without rewriting a single line of business logic</text>

  <!-- Tech badges -->
  <rect x="178" y="222" width="88" height="24" rx="12" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
  <text x="222" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#22c55e" font-family="'Segoe UI',sans-serif">WSDL / SOAP</text>

  <rect x="276" y="222" width="96" height="24" rx="12" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
  <text x="324" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#06b6d4" font-family="'Segoe UI',sans-serif">OpenAPI / REST</text>

  <rect x="382" y="222" width="82" height="24" rx="12" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="423" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#818cf8" font-family="'Segoe UI',sans-serif">MCP JSON</text>

  <rect x="474" y="222" width="90" height="24" rx="12" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="519" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b" font-family="'Segoe UI',sans-serif">IBM AS400/IBMi</text>

  <rect x="574" y="222" width="80" height="24" rx="12" fill="rgba(236,72,153,0.12)" stroke="rgba(236,72,153,0.35)" stroke-width="1"/>
  <text x="614" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#ec4899" font-family="'Segoe UI',sans-serif">SAP · Apigee</text>

  <!-- border -->
  <rect width="960" height="280" rx="16" fill="none" stroke="#2e3347" stroke-width="1"/>
</svg>
